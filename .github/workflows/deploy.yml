name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy petsciibedrock.com
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: ./
          remote_path: /var/www/petsciibedrock.com/
          remote_host: 159.198.64.231
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}
